services:
  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-walkability}
      POSTGRES_USER: ${POSTGRES_USER:-walkability}
      # P0-1: No fallback — a missing password must be a hard failure, not a silent default.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-walkability} -d ${POSTGRES_DB:-walkability}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # P1-3: Always restart db; it is stateful and must recover from OOM or host reboots.
    restart: always
    deploy:
      resources:
        limits:
          # P0-2: 512 MB cap — PostgreSQL on a small server; tune upward if query memory pressure shows up.
          memory: 512m

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      # P0-1: No fallback here either — DATABASE_URL must be fully specified via .env / environment.
      DATABASE_URL: postgres://${POSTGRES_USER:-walkability}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-walkability}
      UPLOADS_DIR: /app/uploads
      PORT: "3001"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      PUBLIC_URL: http://localhost
    volumes:
      - uploads:/app/uploads
    # P1-2: Health check so nginx only starts once the API is genuinely accepting connections.
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
    # P1-3: Restart on crash but respect intentional `docker compose stop`.
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # P0-2: 256 MB — Rust binary is lean; raise if upload processing causes spikes.
          memory: 256m

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      # P3-3: Must be the nginx proxy URL (http://localhost), NOT the internal Docker hostname
      # http://backend:3001. NEXT_PUBLIC_* vars are inlined into browser JS at build time,
      # so the browser — which has no access to Docker's internal DNS — would fail every
      # API call if we used the internal hostname.
      NEXT_PUBLIC_API_URL: http://localhost
    # P1-2: Health check so nginx only starts once Next.js is serving pages.
    # node:20-alpine ships wget but not curl; use wget instead.
    # Use 127.0.0.1 explicitly — Alpine resolves 'localhost' to ::1 (IPv6) but
    # Next.js standalone only binds IPv4 (HOSTNAME=0.0.0.0), causing ECONNREFUSED.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
    # P1-3: Restart on crash but respect intentional `docker compose stop`.
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # P0-2: 256 MB — Next.js standalone build; raise if SSR pages are memory-heavy.
          memory: 256m

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # P1-2: Gate nginx startup on both upstream services being healthy, not just started.
    # Without this, nginx can start and immediately 502 on the first real request.
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    # P1-3: Nginx is stateless; restart freely on any failure.
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # P0-2: 64 MB — nginx:alpine reverse proxy with no caching; very low footprint.
          memory: 64m

volumes:
  postgres_data:
  uploads:
