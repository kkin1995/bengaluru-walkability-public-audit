services:
  db:
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      target: builder
    command: cargo watch -x run
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/target
    environment:
      CORS_ORIGIN: http://localhost:3000

  frontend:
    build:
      context: ./frontend
      target: deps
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001

volumes:
  cargo_cache:
  target_cache:
