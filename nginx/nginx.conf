# Rate limiting — POST-only upload zone. The map means GET/HEAD requests never
# consume tokens; only POST (photo submissions) are throttled.
map $request_method $upload_limit_key {
    POST    $binary_remote_addr;
    default "";
}
limit_req_zone $upload_limit_key zone=upload:10m rate=5r/m;

# Stricter rate-limit zone for the admin login endpoint — 5 req/min per IP,
# applied unconditionally regardless of HTTP method (no map needed here because
# login is always POST and we want to count every attempt).
limit_req_zone $binary_remote_addr zone=admin_login:10m rate=5r/m;

# General admin API zone — covers all /api/admin/* routes (GET and POST alike).
# 60 req/min allows normal dashboard browsing while deterring enumeration or scraping.
# The stricter admin_login zone takes precedence for /api/admin/auth/login via
# exact-match location; this zone handles everything else under /api/admin/.
limit_req_zone $binary_remote_addr zone=admin_api:10m rate=60r/m;

# Named upstream so all proxy_pass directives reference a single definition.
# Change the server address here if the backend service name or port changes.
upstream backend {
    server backend:3001;
}

# Named upstream for the Next.js frontend service.
upstream frontend {
    server frontend:3000;
}

# JSON access log with request_id for structured log aggregation.
log_format json_combined escape=json
    '{"time":"$time_iso8601",'
    '"request_id":"$request_id",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"request_time":$request_time,'
    '"remote_addr":"$remote_addr",'
    '"http_user_agent":"$http_user_agent"}';

access_log /var/log/nginx/access.log json_combined;

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;
    # P1-1: Buffer large request bodies (photo uploads) in memory before spooling to disk.
    # Without this nginx defaults to 8k, causing multipart uploads to always hit the temp
    # path and adds unnecessary disk I/O for small payloads.
    client_body_buffer_size 10m;
    # P1-1: Explicit temp path avoids permission issues on some distros and makes it easy
    # to mount a fast volume here if upload throughput becomes a bottleneck.
    client_body_temp_path /tmp/nginx_upload_temp;

    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # Admin login — exact-match, stricter rate limit than the general API zone.
    # Exact-match (=) takes precedence over the prefix /api/ block regardless of
    # declaration order, but placing it first makes the intent explicit.
    location = /api/admin/auth/login {
        limit_req zone=admin_login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID      $request_id;
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # All other admin API routes — prefix match wins over /api/ for /api/admin/* paths.
    # The exact-match location = /api/admin/auth/login still takes priority for login
    # specifically (nginx exact-match beats prefix match regardless of order).
    # burst=10 accommodates dashboard page-load fan-out (user list + stats in parallel).
    location /api/admin/ {
        limit_req zone=admin_api burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # API requests → Rust backend
    location /api/ {
        limit_req zone=upload burst=2 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
    }

    # Uploaded images → Rust backend ServeDir
    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Health check → backend
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Admin frontend routes — more specific prefix than / so nginx routes /admin*
    # here first. Security headers are scoped to admin pages only to avoid
    # restricting the public map (which uses blob: for Leaflet tiles and
    # data: URIs for marker icons — both permitted in the img-src below).
    location /admin {
        # Prevent clickjacking of the admin dashboard.
        add_header X-Frame-Options "DENY" always;
        # Prevent MIME-type sniffing on admin page responses.
        add_header X-Content-Type-Options "nosniff" always;
        # Limit referer leakage when navigating away from admin pages.
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP: script/style unsafe-inline required for Next.js inline chunks;
        # img-src includes data: and blob: for avatar placeholders and any
        # client-side canvas operations; connect-src 'self' restricts XHR/fetch
        # to same origin only (no third-party API calls from admin pages).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https://unpkg.com; connect-src 'self';" always;

        proxy_pass http://frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_http_version 1.1;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_http_version 1.1;
    }
}
