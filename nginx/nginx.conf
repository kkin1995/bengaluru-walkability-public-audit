server {
    listen 80;
    server_name _;

    client_max_body_size 20M;
    # P1-1: Buffer large request bodies (photo uploads) in memory before spooling to disk.
    # Without this nginx defaults to 8k, causing multipart uploads to always hit the temp
    # path and adds unnecessary disk I/O for small payloads.
    client_body_buffer_size 10m;
    # P1-1: Explicit temp path avoids permission issues on some distros and makes it easy
    # to mount a fast volume here if upload throughput becomes a bottleneck.
    client_body_temp_path /tmp/nginx_upload_temp;

    # API requests → Rust backend
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded images → Rust backend ServeDir
    location /uploads/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Health check → backend
    location /health {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
    }
}
