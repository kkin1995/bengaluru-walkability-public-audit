# Rate limiting — POST-only upload zone. The map means GET/HEAD requests never
# consume tokens; only POST (photo submissions) are throttled.
map $request_method $upload_limit_key {
    POST    $binary_remote_addr;
    default "";
}
limit_req_zone $upload_limit_key zone=upload:10m rate=5r/m;

# JSON access log with request_id for structured log aggregation.
log_format json_combined escape=json
    '{"time":"$time_iso8601",'
    '"request_id":"$request_id",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"request_time":$request_time,'
    '"remote_addr":"$remote_addr",'
    '"http_user_agent":"$http_user_agent"}';

access_log /var/log/nginx/access.log json_combined;

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;
    # P1-1: Buffer large request bodies (photo uploads) in memory before spooling to disk.
    # Without this nginx defaults to 8k, causing multipart uploads to always hit the temp
    # path and adds unnecessary disk I/O for small payloads.
    client_body_buffer_size 10m;
    # P1-1: Explicit temp path avoids permission issues on some distros and makes it easy
    # to mount a fast volume here if upload throughput becomes a bottleneck.
    client_body_temp_path /tmp/nginx_upload_temp;

    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # API requests → Rust backend
    location /api/ {
        limit_req zone=upload burst=2 nodelay;
        proxy_pass http://backend:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
    }

    # Uploaded images → Rust backend ServeDir
    location /uploads/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Health check → backend
    location /health {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
    }
}
